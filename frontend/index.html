<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Social Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Auth Container (Signup & Login) -->
    <div id="auth-container" class="auth-box">
        <!-- Application Title inside Login Box -->
        <h1 class="app-title-main">✨ Mini Social Media ✨</h1>
        
        <!-- Login Form -->
        <div id="login-section">
            <h2>Login</h2>
            <p id="login-error" class="error-msg"></p>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <p class="toggle-text"><span id="go-to-signup">Sign Up</span></p>
        </div>

        <!-- Signup Form -->
        <div id="signup-section" class="hidden">
            <h2>Sign Up</h2>
            <p id="signup-success" class="success-msg"></p>
            <form id="signup-form">
                <input type="text" id="signup-username" placeholder="Choose Username" required>
                <input type="password" id="signup-password" placeholder="Choose Password" required>
                <button type="submit" class="btn">Register</button>
            </form>
            <p class="toggle-text"><span id="go-to-login">Login</span></p>
        </div>
    </div>

    <!-- Main Application Container -->
    <div id="main-app" class="hidden">
        <!-- Header Section -->
        <header class="main-header">
            <div class="header-left">
                <h2 class="app-title-feed">🚀 Mini Social Media</h2>
                <h3>Welcome, <span id="user-display-name">User</span>! 👋</h3>
            </div>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </header>

        <div class="content-container">
            <!-- Create Post Section -->
            <div class="create-post-card">
                <h4>Create New Post</h4>
                <form id="create-post-form">
                    <textarea id="post-text" placeholder="Write something..." rows="3" required></textarea>
                    <div class="file-upload-wrapper">
                        <label for="post-image" class="file-label">📸 Choose Photo</label>
                        <input type="file" id="post-image" accept="image/*" required>
                    </div>
                    <!-- Image Preview Area -->
                    <div id="image-preview-container" class="hidden">
                        <img id="image-preview" src="" alt="Preview">
                    </div>
                    <button type="submit" class="btn submit-post-btn">Post Now</button>
                </form>
            </div>

            <!-- Feed Section -->
            <div id="posts-feed">
                <!-- Dynamic Posts directly generated here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
